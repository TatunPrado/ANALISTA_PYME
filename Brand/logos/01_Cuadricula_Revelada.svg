<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&amp;display=swap');
      .klar { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 42px; fill: #134078; }
      .analytics { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 42px; fill: #134078; }
      .tagline { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 11px; fill: #4B5563; }
    </style>
  </defs>
  <!-- Grid 4x4 -->
  <g transform="translate(20, 20)">
    <!-- Grid lines -->
    <rect x="0" y="0" width="160" height="160" fill="none" stroke="#BEE3F8" stroke-width="2" rx="4"/>
    <line x1="40" y1="0" x2="40" y2="160" stroke="#BEE3F8" stroke-width="1.5"/>
    <line x1="80" y1="0" x2="80" y2="160" stroke="#BEE3F8" stroke-width="1.5"/>
    <line x1="120" y1="0" x2="120" y2="160" stroke="#BEE3F8" stroke-width="1.5"/>
    <line x1="0" y1="40" x2="160" y2="40" stroke="#BEE3F8" stroke-width="1.5"/>
    <line x1="0" y1="80" x2="160" y2="80" stroke="#BEE3F8" stroke-width="1.5"/>
    <line x1="0" y1="120" x2="160" y2="120" stroke="#BEE3F8" stroke-width="1.5"/>
    <!-- Highlighted cell (row 2, col 3) -->
    <rect x="80" y="40" width="40" height="40" fill="#134078" rx="2"/>
    <circle cx="100" cy="60" r="6" fill="#14B8A6"/>
    <!-- Teal accent dot -->
    <circle cx="100" cy="115" r="3" fill="#14B8A6" opacity="0.6"/>
    <circle cx="55" cy="140" r="2" fill="#14B8A6" opacity="0.4"/>
    <circle cx="130" cy="30" r="2" fill="#14B8A6" opacity="0.4"/>
    <!-- Connecting line from highlight to tagline area -->
    <line x1="120" y1="60" x2="200" y2="60" stroke="#14B8A6" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Text -->
  <text x="210" y="78" class="klar">Klar</text>
  <text x="290" y="78" class="analytics">Analytics</text>
  <text x="210" y="103" class="tagline">Diagnóstico empresarial con inteligencia artificial</text>
</svg>
