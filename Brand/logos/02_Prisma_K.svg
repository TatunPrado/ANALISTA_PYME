<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&amp;display=swap');
      .klar { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 42px; fill: #134078; }
      .analytics { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 42px; fill: #134078; }
      .tagline { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 11px; fill: #4B5563; }
    </style>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134078;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Prisma K -->
  <g transform="translate(20, 20)">
    <!-- Vertical stroke -->
    <rect x="20" y="0" width="16" height="160" fill="#134078" rx="3"/>
    <!-- Upper diagonal - solid -->
    <polygon points="36,0 140,55 140,40 36,30" fill="#134078"/>
    <!-- Lower diagonal - descomposed into bands (prisma effect) -->
    <polygon points="36,70 140,135 140,145 36,80" fill="#134078" opacity="0.3"/>
    <polygon points="50,72 140,137 140,144 55,75" fill="#3182CE" opacity="0.5"/>
    <polygon points="65,74 140,139 140,143 70,77" fill="#63B3ED" opacity="0.6"/>
    <polygon points="80,76 140,140 140,142 85,79" fill="#14B8A6" opacity="0.7"/>
    <!-- Prisma triangle accent -->
    <polyline points="140,40 158,50 140,60" fill="none" stroke="#14B8A6" stroke-width="2"/>
    <line x1="158" y1="50" x2="175" y2="50" stroke="#14B8A6" stroke-width="1.5" stroke-dasharray="3,3"/>
  </g>
  <!-- Text -->
  <text x="210" y="78" class="klar">Klar</text>
  <text x="290" y="78" class="analytics">Analytics</text>
  <text x="210" y="103" class="tagline">Diagnóstico empresarial con inteligencia artificial</text>
</svg>
